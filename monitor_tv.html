<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Produção</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f0f14;color:#e8e6e0;font-family:Arial,sans-serif;padding:16px;min-height:100vh}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #2a2a35}
  .title{font-size:22px;font-weight:bold;color:#e8e6e0}
  .subtitle{font-size:13px;color:#666;margin-top:3px}
  .clock{text-align:right}
  .clock-time{font-size:28px;font-weight:bold;color:#e8e6e0}
  .clock-date{font-size:13px;color:#666;margin-top:2px}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .metric{background:#1a1a22;border-radius:8px;padding:12px 16px}
  .metric-label{font-size:12px;color:#666;margin-bottom:4px}
  .metric-value{font-size:30px;font-weight:bold}
  .mv-white{color:#e8e6e0}.mv-warn{color:#f0a030}.mv-danger{color:#e05050}.mv-ok{color:#2ecc8a}
  .sectors{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sector{background:#1a1a22;border-radius:8px;padding:12px 14px}
  .sector.st-ok{border-left:4px solid #2ecc8a}
  .sector.st-warn{border-left:4px solid #f0a030}
  .sector.st-danger{border-left:4px solid #e05050}
  .sector.st-idle{border-left:4px solid #444}
  .sector-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
  .sector-name{font-size:15px;font-weight:bold;color:#e8e6e0}
  .sector-num{font-size:32px;font-weight:bold;color:#e8e6e0;line-height:1}
  .sector-num-label{font-size:11px;color:#555;text-align:right;margin-top:2px}
  .mini-bar{height:4px;background:#2a2a35;border-radius:2px;overflow:hidden;margin-bottom:8px}
  .mini-fill{height:100%;border-radius:2px;transition:width 0.5s}
  .fill-ok{background:#2ecc8a}.fill-warn{background:#f0a030}.fill-danger{background:#e05050}.fill-idle{background:#444}
  .sub-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .sub-block{background:#141419;border-radius:6px;padding:7px 9px}
  .sub-label{font-size:11px;margin-bottom:5px;font-weight:bold}
  .sub-label.warn-label{color:#a06010}
  .sub-label.danger-label{color:#903030}
  .sub-label.ok-label{color:#1a5e2a}
  .tags{display:flex;flex-wrap:wrap;gap:3px}
  .tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:bold}
  .tag-warn{background:#2a1a00;color:#f0a030}
  .tag-danger{background:#2a0000;color:#e05050}
  .tag-ok{background:#0a2a0a;color:#2ecc8a}
  .tag-none{font-size:10px;color:#444}
  .legend{display:flex;gap:20px;margin-top:12px;padding-top:10px;border-top:1px solid #2a2a35;justify-content:center}
  .leg{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
  .leg-dot{width:8px;height:8px;border-radius:50%}
  .update-bar{text-align:center;font-size:11px;color:#444;margin-top:8px}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="title">Controle de produção</div>
    <div class="subtitle" id="subtitle">Painel geral — todos os setores</div>
  </div>
  <div class="clock">
    <div class="clock-time" id="clock-time">--:--</div>
    <div class="clock-date" id="clock-date"></div>
  </div>
</div>
<div class="metrics" id="metrics"></div>
<div class="sectors" id="sectors"></div>
<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#2ecc8a"></div>Normal</div>
  <div class="leg"><div class="leg-dot" style="background:#f0a030"></div>Atenção</div>
  <div class="leg"><div class="leg-dot" style="background:#e05050"></div>Crítico / atrasado</div>
  <div class="leg"><div class="leg-dot" style="background:#444"></div>Ocioso</div>
</div>
<div class="update-bar" id="update-bar">Atualizando...</div>
<script>
const GOOGLE_SHEET_URL="https://script.google.com/macros/s/AKfycbwdVRbjRaKda-JGDqyHgAH6VpC3QMuuzqWOpypo5cRMq3RbTGcj9e7fFbY9CpsHOTUH/exec";
const SETORES=['Desenvolvimento','Impressão','Calandra','Corte','Costura','Montagem','Display','Solda','Acabamento','Personalizados','Expedição'];
const CAP={Desenvolvimento:30,Impressão:40,Calandra:25,Corte:35,Costura:50,Montagem:45,Display:20,Solda:20,Acabamento:50,Personalizados:25,Expedição:60};
let pedidos=[];let modoDemo=true;
function gerarDemo(){const l=[];let n=1001;SETORES.forEach(s=>{const q=Math.floor(Math.random()*15)+3;for(let i=0;i<q;i++){const d=new Date();d.setDate(d.getDate()+Math.floor(Math.random()*18)-4);l.push({num:'#'+(n++),setor:s,prazo:d,urg:Math.random()<0.08});}});return l;}
pedidos=gerarDemo();
async function fetchSheets(){
  try{
    const r=await fetch(GOOGLE_SHEET_URL);
    const p=await r.json();
    if(p.length===0){pedidos=[];modoDemo=false;return;}
    const f=p.filter(x=>x.setor&&SETORES.includes(x.setor)).map(x=>({...x,prazo:x.prazo?new Date(x.prazo):null}));
    pedidos=f;modoDemo=false;
  }catch(e){modoDemo=true;}
}
function isLate(p){return p.prazo&&p.prazo<new Date();}
function stSetor(n){const ps=pedidos.filter(p=>p.setor===n);if(!ps.length)return'idle';if(ps.some(p=>isLate(p)))return'danger';if(ps.some(p=>p.urg)||ps.length>(CAP[n]||30)*0.8)return'warn';return'ok';}
function render(){
  const now=new Date();
  document.getElementById('clock-time').textContent=now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clock-date').textContent=now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  document.getElementById('subtitle').textContent=modoDemo?'Modo demonstração':'Dados ao vivo — Google Sheets';
  document.getElementById('update-bar').textContent='Última atualização: '+now.toLocaleTimeString('pt-BR');
  const atr=pedidos.filter(p=>isLate(p)).length,urg=pedidos.filter(p=>p.urg&&!isLate(p)).length,crit=SETORES.filter(s=>stSetor(s)==='danger').length;
  document.getElementById('metrics').innerHTML='<div class="metric"><div class="metric-label">Total em produção</div><div class="metric-value mv-white">'+pedidos.length+'</div></div><div class="metric"><div class="metric-label">Urgentes</div><div class="metric-value mv-warn">'+urg+'</div></div><div class="metric"><div class="metric-label">Atrasados</div><div class="metric-value mv-danger">'+atr+'</div></div><div class="metric"><div class="metric-label">Setores críticos</div><div class="metric-value '+(crit>0?'mv-danger':'mv-ok')+'">'+crit+'</div></div>';
  document.getElementById('sectors').innerHTML=SETORES.map(nome=>{
    const ps=pedidos.filter(p=>p.setor===nome),st=stSetor(nome),pct=Math.min(Math.round(ps.length/(CAP[nome]||30)*100),100);
    const urg=ps.filter(p=>p.urg&&!isLate(p));
    const atr=ps.filter(p=>isLate(p));
    const norm=ps.filter(p=>!p.urg&&!isLate(p));
    const urgTags=urg.length?urg.map(p=>'<span class="tag tag-warn">'+p.num+'</span>').join(''):'<span class="tag-none">—</span>';
    const atrTags=atr.length?atr.map(p=>'<span class="tag tag-danger">'+p.num+'</span>').join(''):'<span class="tag-none">—</span>';
    const normTags=norm.length?norm.map(p=>'<span class="tag tag-ok">'+p.num+'</span>').join(''):'<span class="tag-none">—</span>';
    return '<div class="sector st-'+st+'"><div class="sector-top"><div class="sector-name">'+nome+'</div><div><div class="sector-num">'+ps.length+'</div></div></div><div class="mini-bar"><div class="mini-fill fill-'+st+'" style="width:'+pct+'%"></div></div><div class="sub-row"><div class="sub-block"><div class="sub-label ok-label">No prazo ('+norm.length+')</div><div class="tags">'+normTags+'</div></div><div class="sub-block"><div class="sub-label warn-label">Urgentes ('+urg.length+')</div><div class="tags">'+urgTags+'</div></div><div class="sub-block"><div class="sub-label danger-label">Atrasados ('+atr.length+')</div><div class="tags">'+atrTags+'</div></div></div></div>';
  }).join('');
}
async function atualizar(){await fetchSheets();render();}
atualizar();setInterval(atualizar,30000);setInterval(()=>{const n=new Date();document.getElementById('clock-time').textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});},1000);
</script>
</body>
</html>
