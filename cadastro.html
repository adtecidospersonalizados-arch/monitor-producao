<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Pedidos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto}
.header{background:#1a1a2e;color:#fff;padding:16px 20px;border-radius:10px;margin-bottom:20px}
.header h1{font-size:18px;font-weight:bold}
.header p{font-size:12px;color:#888;margin-top:4px}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;border:1px solid #e0e0e0}
.card h2{font-size:14px;font-weight:bold;color:#1a1a2e;margin-bottom:14px}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;color:#555;display:block;margin-bottom:4px;font-weight:bold}
.form-group input,.form-group select{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:Arial}
.btn-cadastrar{width:100%;padding:12px;background:#1a1a2e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer}
.btn-cadastrar:disabled{background:#aaa;cursor:not-allowed}
.qr-area{display:none;text-align:center}
.qr-area h3{font-size:14px;color:#1a1a2e;margin-bottom:12px}
.qr-box{display:inline-block;padding:16px;background:#fff;border:2px solid #1a1a2e;border-radius:10px;margin-bottom:12px}
.pedido-info{background:#f0f4ff;border-radius:8px;padding:12px;margin-bottom:12px;text-align:left}
.pedido-info p{font-size:12px;color:#333;margin-bottom:4px}
.pedido-info p strong{color:#1a1a2e}
.btn-imprimir{padding:10px 24px;background:#2ecc8a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;margin-right:8px}
.btn-novo{padding:10px 24px;background:#fff;color:#1a1a2e;border:2px solid #1a1a2e;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer}
.msg{padding:10px;border-radius:6px;font-size:13px;margin-bottom:12px;display:none}
.msg.ok{background:#d6efd8;color:#1a5e2a}
.msg.erro{background:#fddede;color:#8b0000}
.lista-card{background:#fff;border-radius:10px;padding:16px;border:1px solid #e0e0e0}
.lista-card h2{font-size:14px;font-weight:bold;color:#1a1a2e;margin-bottom:12px}
.pedido-item{padding:10px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.pedido-item:last-child{border-bottom:none}
.pedido-num{font-size:13px;font-weight:bold;color:#1a1a2e}
.pedido-setor{font-size:11px;color:#666;margin-top:2px}
.select-status{font-size:11px;padding:4px 8px;border:1px solid #ddd;border-radius:5px;cursor:pointer}
.empty{text-align:center;color:#aaa;font-size:13px;padding:20px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:bold;margin-left:4px}
.badge-entregue{background:#d6efd8;color:#1a5e2a}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Cadastro de Pedidos</h1>
    <p>Registre o pedido e imprima o QR Code para colar na peça</p>
  </div>
  <div class="card">
    <h2>Novo pedido</h2>
    <div class="msg" id="msg"></div>
    <div id="form-area">
      <div class="form-group">
        <label>Número do pedido</label>
        <input type="text" id="num" placeholder="Ex: 5001">
      </div>
      <div class="form-group">
        <label>Prazo de entrega</label>
        <input type="date" id="prazo">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="status">
          <option value="Normal">Normal</option>
          <option value="Urgente">Urgente</option>
          <option value="Prioridade">Prioridade</option>
        </select>
      </div>
      <button class="btn-cadastrar" id="btn-cadastrar" onclick="cadastrar()">Cadastrar e gerar QR Code</button>
    </div>
    <div class="qr-area" id="qr-area">
      <h3>QR Code gerado — imprima e cole no pedido</h3>
      <div class="qr-box" id="qr-code"></div>
      <div class="pedido-info" id="pedido-info"></div>
      <div>
        <button class="btn-imprimir" onclick="window.print()">Imprimir QR Code</button>
        <button class="btn-novo" onclick="novoPedido()">Novo pedido</button>
      </div>
    </div>
  </div>
  <div class="lista-card">
    <h2>Pedidos em produção</h2>
    <div id="lista"><div class="empty">Carregando...</div></div>
  </div>
</div>
<script>
const API="https://script.google.com/macros/s/AKfycbz6o24u6VBIIJ04GPc33Fw2jxVl61CAMlhYpfcsry9-7A1qBTlW3yEZ9cU8eRoJjdPd/exec";
const SCAN_URL="https://adtecidospersonalizados-arch.github.io/monitor-producao/leitor.html?num=";

function mostrarMsg(txt,tipo){const el=document.getElementById('msg');el.textContent=txt;el.className='msg '+tipo;el.style.display='block';setTimeout(()=>el.style.display='none',3000);}

async function cadastrar(){
  const num=document.getElementById('num').value.trim();
  const prazo=document.getElementById('prazo').value;
  const status=document.getElementById('status').value;
  if(!num){mostrarMsg('Informe o número do pedido!','erro');return;}
  const btn=document.getElementById('btn-cadastrar');
  btn.disabled=true;btn.textContent='Cadastrando...';
  try{
    await fetch(API,{method:'POST',body:JSON.stringify({acao:'cadastrar',num,prazo,status})});
    gerarQR(num,prazo,status);
    carregarLista();
  }catch(e){mostrarMsg('Erro ao cadastrar.','erro');}
  btn.disabled=false;btn.textContent='Cadastrar e gerar QR Code';
}

function gerarQR(num,prazo,status){
  document.getElementById('form-area').style.display='none';
  document.getElementById('qr-area').style.display='block';
  document.getElementById('qr-code').innerHTML='';
  new QRCode(document.getElementById('qr-code'),{text:SCAN_URL+encodeURIComponent(num),width:180,height:180,colorDark:"#1a1a2e",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});
  document.getElementById('pedido-info').innerHTML=
    '<p><strong>Pedido:</strong> #'+num+'</p>'+
    (prazo?'<p><strong>Prazo:</strong> '+new Date(prazo+'T12:00:00').toLocaleDateString('pt-BR')+'</p>':'')+
    '<p><strong>Status:</strong> '+status+'</p>'+
    '<p><strong>Primeiro setor:</strong> Desenvolvimento</p>';
}

function novoPedido(){
  document.getElementById('form-area').style.display='block';
  document.getElementById('qr-area').style.display='none';
  document.getElementById('num').value='';
  document.getElementById('prazo').value='';
  document.getElementById('status').value='Normal';
}

async function atualizarStatus(num,status){
  try{
    await fetch(API,{method:'POST',body:JSON.stringify({acao:'atualizar',num,status})});
    carregarLista();
    if(status==='Entregue') mostrarMsg('Pedido #'+num+' marcado como entregue e removido do painel!','ok');
  }catch(e){alert('Erro ao atualizar status.');}
}

async function carregarLista(){
  try{
    const r=await fetch(API+'?acao=listar&todos=true');
    const pedidos=await r.json();
    const el=document.getElementById('lista');
    if(!pedidos.length){el.innerHTML='<div class="empty">Nenhum pedido cadastrado ainda.</div>';return;}
    el.innerHTML=pedidos.slice().reverse().map(p=>{
      return '<div class="pedido-item">'+
        '<div><div class="pedido-num">#'+p.num+(p.status==='Entregue'?'<span class="badge badge-entregue">Entregue</span>':'')+'</div>'+
        '<div class="pedido-setor">'+(p.setor||'—')+(p.prazo?' • '+new Date(p.prazo+'T12:00:00').toLocaleDateString('pt-BR'):'')+'</div></div>'+
        '<select class="select-status" onchange="atualizarStatus(\''+p.num+'\',this.value)">'+
        '<option value="Normal"'+(p.status==='Normal'?' selected':'')+'>Normal</option>'+
        '<option value="Urgente"'+(p.status==='Urgente'?' selected':'')+'>Urgente</option>'+
        '<option value="Prioridade"'+(p.status==='Prioridade'?' selected':'')+'>Prioridade</option>'+
        '<option value="Entregue"'+(p.status==='Entregue'?' selected':'')+'>✓ Entregue</option>'+
        '</select></div>';
    }).join('');
  }catch(e){document.getElementById('lista').innerHTML='<div class="empty">Erro ao carregar pedidos.</div>';}
}

carregarLista();
</script>
</body>
</html>
